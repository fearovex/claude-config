project:
  name: "agent-config"
  description: "Global Claude Code configuration: SDD orchestrator, meta-tools, and skill catalog"
  root: "~/agent-config"
  stack:
    language: "markdown + yaml + bash"
    framework: "Claude Code SDD meta-system"
    database: "none"
    testing: "manual validation via /project:audit"
  conventions:
    naming: "kebab-case (skills, commands) / UPPER_SNAKE (constants)"
    structure: "skill-per-directory with SKILL.md entry point"

artifact_store:
  mode: openspec
  changes_dir: openspec/changes
  archive_dir: openspec/changes/archive

# ---------------------------------------------------------------------------
# skill_overrides (optional) — Redirect specific skills to custom paths
# ---------------------------------------------------------------------------
# Allows project-local or custom skill paths to override the global catalog
# for specific skills. Paths may be absolute or relative to the project root.
# Relative paths are resolved from the directory containing this config file.
#
# Resolution order (without overrides): project-local → global catalog
# Resolution order (with overrides):    override path → project-local → global catalog
#
# See docs/SKILL-RESOLUTION.md for the full resolution algorithm.
#
# skill_overrides:
#   sdd-explore: ".claude/skills/custom-explore/SKILL.md"
#   sdd-apply:   "/absolute/path/to/my-apply/SKILL.md"

# Apply phase strategy for fix-archive-residue-specs-loading:
#   Phase 1 (Critical): sdd-archive deletion verification + project-setup index.yaml scaffold
#   Phase 2 (Spec):     Index-first spec loading in all 7 phase skills
#   Phase 3 (Gate):     Post-explore contradiction gate pre-existing detection in sdd-ff

rules:
  proposal:
    - "Every modification to an existing skill requires a proposal with justification"
    - "Every new skill must define its trigger and relationship to other skills"
    - "Changes to the global CLAUDE.md require a proposal if they affect the orchestrator"
  specs:
    - "Define expected skill behavior with concrete examples"
    - "Specify which files the skill creates/modifies/reads"
    - "Define a verifiable success criterion"
  design:
    - "Document the internal skill flow step by step"
    - "Specify how it communicates with other skills (shared artifacts)"
    - "Justify non-obvious design decisions"
  tasks:
    - "One task = one section of SKILL.md or one new file"
    - "Include the exact file path to create/modify"
    - "Each task must be independently verifiable"
  apply:
    - "Follow tasks.md exactly — no improvising"
    - "Run /project:audit on agent-config after each apply"
    - "Update global CLAUDE.md if the change adds/removes commands"
  verify:
    - "Run /project:audit — score must be >= previous score"
    - "Every archived change MUST have a verify-report.md with at least one [x] checked criterion"
    - "Verify the modified skill works on a real test project (not just in isolation)"
    - "Confirm sync.sh + install.sh work with the new files"
    - "If the change modifies a skill that produces artifacts, verify the artifact format is valid"

testing:
  strategy: "audit-as-integration-test"
  minimum_score_to_archive: 75
  required_artifacts_per_change:
    - "proposal.md"
    - "tasks.md"
    - "verify-report.md"
  optional_artifacts:
    - "prd.md"                  # created by sdd-propose if template exists and no prd.md present
    - "docs/adr/NNN-*.md"       # created by sdd-design when a significant architectural decision is detected
  verify_report_requirements:
    - "At least one checklist item marked [x]"
    - "Explicitly states which test project was used"
    - "Documents any known gaps or deferred issues"
  test_project:
    description: "Use the Audiio V3 project (D:/Proyectos/Audiio/audiio_v3_1) as the canonical test target"
    why: "Complex real-world project that exercises all audit dimensions"

# ---------------------------------------------------------------------------
# feature_docs (optional) — Configuration for Dimension 10 feature docs audit
# ---------------------------------------------------------------------------
# Uncomment and configure to enable config-driven feature documentation audit.
# Without this section, project-audit uses heuristic detection as fallback.
#
# convention: "skill"     # "skill" | "markdown" | "mixed"
#   skill    — feature docs are SKILL.md files in .claude/skills/
#   markdown — feature docs are .md files in a docs/ subdirectory
#   mixed    — both SKILL.md and .md files are used
#
# paths:                  # where to look for feature docs
#   - .claude/skills/
#   - docs/features/
#
# feature_detection:
#   strategy: "directory" # "directory" | "explicit"
#     directory — auto-detect features from subdirectories in root
#     explicit  — use the explicit list below
#   root: src/            # scan this directory for feature subdirectories
#   exclude:              # directories to skip during heuristic detection
#     - shared
#     - utils
#     - common
#     - lib
#     - types
#     - hooks
#     - components
#   # features:           # only used when strategy: "explicit"
#   #   - auth
#   #   - payments
#   #   - notifications
#
# feature_docs:
#   convention: skill
#   paths:
#     - .claude/skills/
#   feature_detection:
#     strategy: directory
#     root: src/
#     exclude: [shared, utils, common, lib, types, hooks, components]

# ---------------------------------------------------------------------------
# analysis (optional) — Configuration for /project-analyze codebase analysis
# ---------------------------------------------------------------------------
# Uncomment and configure to control how project-analyze samples the codebase.
# Without this section, project-analyze uses all defaults.
#
# max_sample_files: 20      # maximum number of files sampled for convention
#                           # detection (default: 20); files are distributed
#                           # proportionally across source directories by recency
#
# exclude_dirs:             # directories to skip during file sampling
#   - node_modules
#   - .git
#   - dist
#   - build
#   - coverage
#
# analysis_targets:         # optional explicit file list — when set, overrides
#   - src/auth/service.ts   # auto-sampling entirely; only these files are used
#   - src/core/domain.ts    # for convention detection (Step 4)
#
# analysis:
#   max_sample_files: 20
#   exclude_dirs: [node_modules, .git, dist, build, coverage]
#   # analysis_targets:
#   #   - src/auth/service.ts
#   #   - src/core/domain.ts

# ---------------------------------------------------------------------------
# apply_max_retries (optional) — Circuit breaker for /sdd-apply task execution
# ---------------------------------------------------------------------------
# Maximum number of retry attempts per task before sdd-apply marks the task
# as [BLOCKED] and halts the phase. If absent, the default is 3.
#
# apply_max_retries: 3

# ---------------------------------------------------------------------------
# tdd (optional) — TDD mode configuration for /sdd-apply
# ---------------------------------------------------------------------------
# Uncomment and configure to control TDD behavior during /sdd-apply.
# Without this section, sdd-apply uses heuristic detection (testing skills
# in CLAUDE.md + test file patterns) to decide whether to activate TDD mode.
#
# enabled: true              # explicitly activate TDD mode for this project
#                            # when set, overrides heuristic detection entirely
#
# explicit_only: false       # if true, TDD mode activates ONLY when
#                            # enabled: true is set above; heuristic detection
#                            # is disabled. If false (default), heuristic
#                            # detection is used as fallback when enabled is
#                            # not set.
#
# tdd:
#   enabled: true
#   explicit_only: false

# ---------------------------------------------------------------------------
# diagnosis_commands (optional) — Read-only commands for /sdd-apply Diagnosis Step
# ---------------------------------------------------------------------------
# Uncomment and configure to supply project-specific read-only shell commands
# that sdd-apply runs during the Diagnosis Step (Step 4) for every task.
# Without this key, sdd-apply uses only auto-detected read-only commands (or none).
#
# Commands are expected to be NON-DESTRUCTIVE (read-only). The user is responsible
# for ensuring configured commands do not modify project state.
# A command that exits non-zero is recorded in the DIAGNOSIS block and does NOT
# block the Diagnosis Step — the step continues and the failure is noted in Risk.
#
# diagnosis_commands:
#   - "npm test -- --dry-run"
#   - "cat ai-context/known-issues.md"

# ---------------------------------------------------------------------------
# verify_commands (optional) — Custom verification commands for /sdd-verify
# ---------------------------------------------------------------------------
# Uncomment and configure to supply project-specific verification commands
# that sdd-verify runs during the tool execution step (Step 6).
# When present, this key overrides auto-detection entirely — it is NOT additive.
# When absent, auto-detection applies unchanged (package.json, pytest, etc.).
#
# Commands are expected to be NON-DESTRUCTIVE (read-only). The user is responsible
# for ensuring configured commands do not modify project state.
# Commands run in listed order; each captures exit code + output independently.
# A command that exits non-zero is recorded in ## Tool Execution and contributes
# to the verdict via existing WARNING/CRITICAL logic — it does NOT block sdd-verify.
#
# verify_commands:
#   - "npm test"
#   - "npm run lint"

# ---------------------------------------------------------------------------
# verify (optional) — Auto-detected verification commands for /sdd-verify
# ---------------------------------------------------------------------------
# Populated automatically by project-setup on initialization and optionally
# by memory-init when the section is absent.
# Priority in sdd-verify Step 6:
#   Level 1: verify_commands (manual override — highest, unchanged)
#   Level 2: verify.test_commands (this section)
#   Level 3: auto-detection table (package.json, pytest, Makefile, etc.)
#
# test_commands (list of strings, optional):
#   Commands to run the project test suite. Empty list is treated as absent
#   and falls through to auto-detection — it is NOT treated as zero-command success.
#
# build_command (string, optional):
#   Single command to build the project. Overrides auto-detected build command.
#
# type_check_command (string, optional):
#   Single command to run type checking. Overrides auto-detected type check.
#
# verify:
#   test_commands:
#     - "npm test"
#   build_command: "npm run build"
#   type_check_command: "npx tsc --noEmit"

# ---------------------------------------------------------------------------
# coverage (optional) — Coverage threshold for /sdd-verify
# ---------------------------------------------------------------------------
# Uncomment and configure to enable coverage validation in /sdd-verify.
# Without this section, the coverage validation step is skipped entirely.
#
# threshold: 80              # minimum coverage % — advisory only, never
#                            # blocks archiving. sdd-verify reports PASS/FAIL
#                            # but the verdict is not affected.
#
# tool: "auto"               # coverage tool to use when parsing output
#                            # "auto" — detect from test runner output
#                            # "jest" | "pytest-cov" | "c8" | etc.
#
# coverage:
#   threshold: 80
#   tool: "auto"

# ---------------------------------------------------------------------------
# model_routing (optional) — Per-phase model selection for SDD orchestrators
# ---------------------------------------------------------------------------
# Supports two activation modes:
#   1. CLI flag: /sdd-ff --opus <description>  (overrides all phases)
#   2. Per-phase: model_routing.phases map     (overrides named phases only)
# Resolution order: CLI flag > per-phase config > claude-sonnet-4-5 default
#
model_routing:
  phases:
    explore: claude-sonnet-4-5  # sdd-explore phase — file reading, mechanical
    propose: claude-opus-4-5    # sdd-propose phase — conversation synthesis, high intelligence
    spec:    claude-sonnet-4-5  # sdd-spec phase — structured REQ translation
    design:  claude-opus-4-5    # sdd-design phase — architectural reasoning
    tasks:   claude-sonnet-4-5  # sdd-tasks phase — mechanical breakdown
